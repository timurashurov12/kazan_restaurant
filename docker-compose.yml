services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      API_PORT: "3000"
      CLIENT_URL: ${CLIENT_URL:-http://localhost}

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - server
