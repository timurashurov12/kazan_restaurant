services:
  postgres:
    image: postgres:16-alpine
    container_name: kazan-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: kazan
      POSTGRES_PASSWORD: kazan
      POSTGRES_DB: kazan
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
