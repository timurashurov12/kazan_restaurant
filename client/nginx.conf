resolver 127.0.0.11 valid=10s ipv6=off;

# Detect API requests by Authorization header
map $http_authorization $is_api {
    default 0;
    ~.+     1;
}

server {
    listen 80;
    server_name _;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Static assets
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Non-conflicting API routes (no SPA overlap) ──

    location /auth {
        set $upstream http://server:3000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /menu-types {
        set $upstream http://server:3000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /menu {
        set $upstream http://server:3000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/menu/[^/]+/categories(/|\?|$) {
        set $upstream http://server:3000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/menu/categories/[^/]+/items(/|\?|$) {
        set $upstream http://server:3000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /languages {
        set $upstream http://server:3000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /site-settings {
        set $upstream http://server:3000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/translate {
        set $upstream http://server:3000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/menus {
        set $upstream http://server:3000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads {
        set $upstream http://server:3000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api {
        set $upstream http://server:3000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Conflicting admin routes (SPA + API) ──
    # API calls have Authorization header → proxy to backend
    # Browser navigation → serve SPA

    location /admin/languages {
        set $upstream http://server:3000;
        if ($is_api) {
            proxy_pass $upstream;
            break;
        }
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    location /admin/menu-types {
        set $upstream http://server:3000;
        if ($is_api) {
            proxy_pass $upstream;
            break;
        }
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    location /admin/categories {
        set $upstream http://server:3000;
        if ($is_api) {
            proxy_pass $upstream;
            break;
        }
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    location /admin/menu-items {
        set $upstream http://server:3000;
        if ($is_api) {
            proxy_pass $upstream;
            break;
        }
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    # ── SPA fallback ──

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
