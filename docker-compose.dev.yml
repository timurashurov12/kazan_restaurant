services:
  postgres:
    image: postgres:16-alpine
    container_name: kazan-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kazan
      POSTGRES_PASSWORD: kazan
      POSTGRES_DB: kazan
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kazan"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
